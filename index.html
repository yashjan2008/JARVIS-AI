<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>JARVIS AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="sidebar">

            <h1>JARVIS</h1>

            <div class="status">
                ● ONLINE
            </div>

        </div>

        <div class="main">

            <div
                class="chat-area"
                id="chat-area"
            >

                <div class="jarvis-message">
                    JARVIS SYSTEM ONLINE...
                </div>

            </div>

            <div class="input-area">

                <input
                    type="text"
                    id="prompt"
                    placeholder="Ask Jarvis anything..."
                >

                <button id="send-btn">
                    SEND
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
